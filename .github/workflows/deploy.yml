name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e  # Exit on any error
            
            echo "🚀 Starting deployment..."
            
            # Navigate to project directory
            cd /home/alphablocks-backend-v1  # Note: Changed /Home to /home (lowercase)
            
            # Stash any local changes (if any)
            git stash
            
            # Pull latest changes
            echo "📥 Pulling latest code from main..."
            git pull origin main
            
            # Install dependencies
            echo "📦 Installing dependencies..."
            yarn install --frozen-lockfile --production=false
            
            # Run database migrations (if applicable)
            # echo "🗄️ Running database migrations..."
            # yarn migrate
            
            # Build the project (if needed)
            # echo "🔨 Building project..."
            # yarn build
            
            # Reload PM2 processes
            echo "♻️ Reloading PM2 processes..."
            pm2 reload alphablocks-backend-api --update-env
            pm2 reload alphablocks-email-worker --update-env
            
            # Check PM2 status
            echo "✅ Checking PM2 status..."
            pm2 status
            
            # Save PM2 configuration
            pm2 save
            
            echo "🎉 Deployment completed successfully!"
      
      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "❌ Deployment failed! Rolling back..."
            cd /Home/alphablocks-backend-v1
            git reset --hard HEAD~1
            pm2 reload alphablocks-backend-api
            pm2 reload alphablocks-email-worker